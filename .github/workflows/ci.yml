name: CI

on:
  push:
  pull_request:
  release:
    types: [published]

# The ffmpeg the app ships with, and the one the smoke tests run against.
# The FULL build, not essentials: essentials lacks libsvtav1, which the app
# needs for CPU AV1 encoding. Pinned to 7.1.1: the version the app was tested
# against, and ffmpeg 8.x NVENC requires NVIDIA driver 610+, which would
# silently break GPU encoding for most users. Bump deliberately, re-test NVENC
# on real hardware, and update the SHA256 when you do.
env:
  FFMPEG_URL: https://github.com/GyanD/codexffmpeg/releases/download/7.1.1/ffmpeg-7.1.1-full_build.zip
  FFMPEG_SHA256: D760E1B3574402ED18B4865851F87D87E73965A982E6453212DF8621FED1C508

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -r requirements.txt pytest
      - name: Fetch pinned ffmpeg (for the smoke tests)
        shell: pwsh
        run: |
          curl.exe -sL -o ffmpeg.zip $env:FFMPEG_URL
          $actual = (Get-FileHash ffmpeg.zip -Algorithm SHA256).Hash
          if ($actual -ne $env:FFMPEG_SHA256) {
            throw "ffmpeg checksum mismatch: expected $env:FFMPEG_SHA256, got $actual"
          }
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_tmp
          $bin = (Get-ChildItem ffmpeg_tmp -Recurse -Filter ffmpeg.exe | Select-Object -First 1).DirectoryName
          Add-Content $env:GITHUB_PATH $bin
      - run: pytest -q

  build:
    # Builds the self contained exe and attaches it to the GitHub release.
    needs: test
    if: github.event_name == 'release'
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -r requirements.txt pyinstaller
      - name: Fetch pinned ffmpeg (bundled into the exe)
        shell: pwsh
        run: |
          # This artifact ships inside the exe, so its integrity is verified
          # against the pinned hash before anything is bundled.
          curl.exe -sL -o ffmpeg.zip $env:FFMPEG_URL
          $actual = (Get-FileHash ffmpeg.zip -Algorithm SHA256).Hash
          if ($actual -ne $env:FFMPEG_SHA256) {
            throw "ffmpeg checksum mismatch: expected $env:FFMPEG_SHA256, got $actual"
          }
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_tmp
          $bin = (Get-ChildItem ffmpeg_tmp -Recurse -Filter ffmpeg.exe | Select-Object -First 1).DirectoryName
          Add-Content $env:GITHUB_PATH $bin
      - name: Build exe
        shell: pwsh
        run: ./build.ps1
      - name: Attach exe to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Laxy Toolbox.exe
